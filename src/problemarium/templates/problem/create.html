{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}New Problem{% endblock %}</h1>
{% endblock %}

{% block content %}
  <form method="post">
    <label for="title">Titulo</label>
    <input name="title" id="title" value="{{ request.form['title'] }}" required>
    <label for="body">Enunciado</label>
    <textarea name="statement" id="statement" required>{{ request.form['statement'] }}</textarea>
    <label for="subject">Assunto</label>
    <input name="subject" id="subject" value="{{ request.form['statement'] }}" required>
    <label for="difficulty">Dificuldade</label>
    <select name ="difficulty" required> 
      <option value="" select disabled selected>Selecione uma dificuldade</option>
      <option value="fácil">Fácil</option>
      <option value="medio">Médio</option>
      <option value="dificil">Difícil</option>
    </select>
    <label for="answer">Resposta</label>
    <textarea name="answer" id="answer" required>{{ request.form['answer'] }}</textarea>
    <label for="resolution">Resolução (opcional)</label>
    <textarea name="resolution" id="resolution">{{ request.form['resolution'] }}</textarea>
    <input type="submit" value="Salvar">
    
  </form>
{% endblock %}
